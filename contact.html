<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiries - PathPort</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">🚀 PathPort</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li><a href="packages.html">Packages</a></li>
                <li><a href="booking.html">Book Now</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-content">
        <h2>📬 Pipeline Channels</h2>
        <p class="section-subtitle">Connect directly with our primary system operators.</p>

        <div class="booking-container">
            <form onsubmit="alert('Message transmission logged successfully!'); this.reset(); return false;">
                <div class="form-group">
                    <label>User Handle / Name</label>
                    <input type="text" required placeholder="Enter handle name...">
                </div>
                <div class="form-group">
                    <label>Return Target Email</label>
                    <input type="email" required placeholder="user@domain.com">
                </div>
                <div class="form-group">
                    <label>Transmission Payload / Message</label>
                    <textarea required placeholder="Type your message details here..." style="min-height: 120px; resize: none;"></textarea>
                </div>
                <button type="submit" class="btn btn-block">Broadcast Transmission</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
